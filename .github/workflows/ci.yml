name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    name: Quality + Security Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Backend lint
        working-directory: backend
        run: npm run lint

      - name: Backend tests
        working-directory: backend
        run: npm run test:ci

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Dependency scan (backend)
        working-directory: backend
        run: npm audit --audit-level=critical

      - name: Dependency scan (frontend)
        working-directory: frontend
        run: npm audit --audit-level=critical

      - name: Trivy filesystem scan (critical)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: SonarQube analysis
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker:
    name: Docker build + image scan + push
    runs-on: ubuntu-latest
    needs: quality-and-security
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:${{ github.sha }} -f backend/Dockerfile backend
          docker tag ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:${{ github.sha }} ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:latest

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:${{ github.sha }} -f frontend/Dockerfile frontend
          docker tag ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:${{ github.sha }} ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:latest

      - name: Trivy backend image scan (critical)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Trivy frontend image scan (critical)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Push backend images
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:${{ github.sha }}
          docker push ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-backend:latest

      - name: Push frontend images
        if: github.event_name != 'pull_request'
        run: |
          docker push ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:${{ github.sha }}
          docker push ghcr.io/${{ steps.owner.outputs.owner_lc }}/sport_devops-frontend:latest
